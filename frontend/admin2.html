x   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">

    <title>MES MSPS AI Admin Dashboard</title>

    <style>
        /* CSS specifically for the new dynamic views */
        .view-section {
            display: none; /* Hidden by default */
            animation: fadeIn 0.3s ease-in-out;
        }
        .view-section.active {
            display: block; /* Show active section */
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Top Bar Styling (Added Filter Support) */
        .top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .top .search-box {
            display: flex;
            align-items: center;
            background: #f4f4f4;
            padding: 8px 12px;
            border-radius: 5px;
            flex-grow: 1;
            margin: 0 20px;
            max-width: 600px;
            min-width: 0;
        }
        .top .search-box i {
            margin-right: 8px;
            color: #666;
            font-size: 18px;
        }
        .top .search-box input {
            border: none;
            background: transparent;
            outline: none;
            margin: 0;
            width: 100%;
            flex-grow: 1;
            font-size: 15px;
        }
        .top .search-box .search-btn {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 6px;
            border-radius: 3px;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .top .search-box .search-btn:hover {
            background-color: rgba(0,0,0,0.08);
        }
        .filter-box select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

        /* Document Grid & Previews */
        .doc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .doc-card {
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .doc-preview {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 4px;
            background-color: #f4f4f4;
            margin-bottom: 10px;
            border: none;
        }
        .doc-card p {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Buttons & Forms */
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: #fff;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-primary { background: #0e4bf1; }
        .btn-primary:hover { background: #0b3bc1; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        
        .upload-container {
            margin-top: 20px;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #file-input { margin-bottom: 15px; }
        #temp-preview-container { margin-top: 15px; display: none; }

        /* Success Toast Animation */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #2ecc71;
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            font-weight: bold;
        }
        #toast.show {
            visibility: visible;
            animation: slideUp 0.5s, fadeOut 0.5s 2.5s;
        }
        @keyframes slideUp {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }
        @keyframes fadeOut {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }
    </style>
</head>

<body>

<nav>
    <div class="logo-name">
        <div class="logo-image">
            <img src="images/logo.png" alt="MES MSPS AI Logo">
        </div>
        <span class="logo_name">MES MSPS AI</span>
    </div>

    <div class="menu-items">
        <ul class="nav-links">
            <li>
                <a href="#" onclick="switchView('dashboard')">
                    <i class="uil uil-estate"></i>
                    <span class="link-name">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="#" onclick="switchView('upload')">
                    <i class="uil uil-upload"></i>
                    <span class="link-name">Upload Document</span>
                </a>
            </li>
            <li>
                <a href="#" onclick="switchView('delete')">
                    <i class="uil uil-trash"></i>
                    <span class="link-name">Delete Existing Document</span>
                </a>
            </li>
        </ul>

        <ul class="logout-mode">
            <li>
                <a href="index.html">
                    <i class="uil uil-signout"></i>
                    <span class="link-name">Logout</span>
                </a>
            </li>
            <li class="mode">
                <a href="#">
                    <i class="uil uil-moon"></i>
                    <span class="link-name">Dark Mode</span>
                </a>
                <div class="mode-toggle">
                    <span class="switch"></span>
                </div>
            </li>
        </ul>
    </div>
</nav>

<section class="dashboard">
    <div class="top">
        <i class="uil uil-bars sidebar-toggle"></i>
        
        <div class="search-box">
            <i class="uil uil-search"></i>
            <input type="text" id="search-input" placeholder="Search document...">
            <button type="button" onclick="filterDocuments()" class="search-btn">
                <i class="uil uil-search"></i>
            </button>
        </div>
        
        <div class="filter-box">
            <select id="doc-filter" onchange="filterDocuments()">
                <option value="all">All Documents</option>
                <option value="pdf">PDFs Only</option>
                <option href="#" value="image">View all notes</option>
            </select>
        </div>
    </div>

    <div class="dash-content">

        <div id="view-dashboard" class="view-section active">
            <div class="overview">
                <div class="title">
                    <i class="uil uil-tachometer-fast-alt"></i>
                    <span class="text">Dashboard - Document Previews</span>
                </div>
                <div id="dashboard-docs-list" class="doc-grid">
                    <p style="margin-top:20px;">No documents uploaded yet.</p>
                </div>
            </div>
        </div>

        <div id="view-upload" class="view-section">
            <div class="overview">
                <div class="title">
                    <i class="uil uil-upload"></i>
                    <span class="text">Upload New Document</span>
                </div>
                
                <div class="upload-container">
                    <input type="file" id="file-input" accept="image/*,application/pdf" onchange="previewSelectedFile(event)">
                    
                    <div id="temp-preview-container">
                        <p><strong>Preview:</strong></p>
                        <iframe id="temp-preview" class="doc-preview" src=""></iframe>
                    </div>

                    <button class="btn btn-primary" onclick="uploadDocument()">Upload to Server</button>
                </div>
            </div>
        </div>

        <div id="view-delete" class="view-section">
            <div class="overview">
                <div class="title">
                    <i class="uil uil-trash"></i>
                    <span class="text">Delete Documents</span>
                </div>
                <div id="delete-docs-list" class="doc-grid">
                    <p style="margin-top:20px;">No documents to delete.</p>
                </div>
            </div>
        </div>

    </div>
</section>

<div id="toast">Document uploaded successfully!</div>

<script>
    const SERVER_URL = 'http://127.0.0.1:5000';
    let uploadedDocuments = [];

    window.onload = () => {
        fetchDocuments();
    };

    function switchView(viewName) {
        document.querySelectorAll('.view-section').forEach(el => {
            el.classList.remove('active');
        });
        document.getElementById(`view-${viewName}`).classList.add('active');

        if(viewName === 'dashboard' || viewName === 'delete') {
            fetchDocuments(); 
        }
    }

    function previewSelectedFile(event) {
        const file = event.target.files[0];
        const previewContainer = document.getElementById('temp-preview-container');
        const previewElement = document.getElementById('temp-preview');

        if (file) {
            const fileURL = URL.createObjectURL(file);
            previewElement.src = fileURL;
            previewContainer.style.display = 'block';
        } else {
            previewContainer.style.display = 'none';
        }
    }

    // Displays the success toast animation
    function showSuccessToast(message) {
        const toast = document.getElementById("toast");
        toast.innerText = message;
        toast.classList.add("show");
        
        // Remove the class after 3 seconds so it can be triggered again
        setTimeout(() => {
            toast.classList.remove("show");
        }, 3000);
    }

    async function uploadDocument() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];

        if (!file) {
            alert("Please select a document first!");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        try {
            const response = await fetch(`${SERVER_URL}/upload`, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                // Trigger success animation instead of native alert
                showSuccessToast(`${file.name} uploaded successfully!`);
                
                // Reset form
                fileInput.value = '';
                document.getElementById('temp-preview-container').style.display = 'none';
                document.getElementById('temp-preview').src = '';

                // Switch back to dashboard and refresh the list
                switchView('dashboard');
            } else {
                alert("Failed to upload the document. Check your server.");
            }
        } catch (error) {
            console.error("Upload error:", error);
            alert("Could not connect to the server. Is Python running?");
        }
    }

    async function fetchDocuments() {
        try {
            const response = await fetch(`${SERVER_URL}/files`);
            if (response.ok) {
                uploadedDocuments = await response.json(); 
                filterDocuments(); // Apply any existing search/filters immediately
            }
        } catch (error) {
            console.error("Fetch error:", error);
        }
    }

    // New Function to handle Search and Filtering
    function filterDocuments() {
        const searchQuery = document.getElementById('search-input').value.toLowerCase();
        const filterType = document.getElementById('doc-filter').value;

        const filteredDocs = uploadedDocuments.filter(doc => {
            const matchesSearch = doc.name.toLowerCase().includes(searchQuery);
            let matchesType = true;

            // Simple check by extension
            if (filterType === 'pdf') {
                matchesType = doc.name.toLowerCase().endsWith('.pdf');
            } else if (filterType === 'image') {
                matchesType = doc.name.toLowerCase().match(/\.(jpg|jpeg|png|gif)$/i);
            }

            return matchesSearch && matchesType;
        });

        renderDashboard(filteredDocs);
        renderDeleteView(filteredDocs);
    }

    // Render functions now accept a list of docs (defaulting to the full list if none provided)
    function renderDashboard(docsToRender = uploadedDocuments) {
        const container = document.getElementById('dashboard-docs-list');
        container.innerHTML = ''; 

        if (docsToRender.length === 0) {
            container.innerHTML = '<p>No documents found.</p>';
            return;
        }

        docsToRender.forEach(doc => {
            container.innerHTML += `
                <div class="doc-card">
                    <iframe class="doc-preview" src="${doc.url}"></iframe>
                    <p title="${doc.name}">${doc.name}</p>
                </div>
            `;
        });
    }

    function renderDeleteView(docsToRender = uploadedDocuments) {
        const container = document.getElementById('delete-docs-list');
        container.innerHTML = ''; 

        if (docsToRender.length === 0) {
            container.innerHTML = '<p>No documents to delete.</p>';
            return;
        }

        docsToRender.forEach(doc => {
            container.innerHTML += `
                <div class="doc-card">
                    <iframe class="doc-preview" src="${doc.url}"></iframe>
                    <p title="${doc.name}">${doc.name}</p>
                    <button class="btn btn-danger" onclick="deleteDocument('${doc.name}')">Delete</button>
                </div>
            `;
        });
    }

    async function deleteDocument(filename) {
        if (confirm(`Are you sure you want to permanently delete ${filename}?`)) {
            try {
                const response = await fetch(`${SERVER_URL}/delete/${filename}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    fetchDocuments();
                } else {
                    alert("Failed to delete the document.");
                }
            } catch (error) {
                console.error("Delete error:", error);
                alert("Could not connect to the server.");
            }
        }
    }
</script>

<script src="js/admin.js"></script>

</body>
</html>
